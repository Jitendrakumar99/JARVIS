{% extends 'base.html' %}
{% block body_class %}chat-page{% endblock %}
{% block title %}Neural Interface | J.A.R.V.I.S{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="chat-main-wrapper">
    <!-- Main Chat Hub -->
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="chat-message assistant welcome-message" style="margin-top: 2rem;">
                <div class="welcome-text" style="width: 100%; text-align: center;">
                    <p style="font-size: 1.1rem; color: var(--text-muted); line-height: 1.6; max-width: 600px; margin: 0 auto;">
                        Greeting. I am J.A.R.V.I.S, your core intelligence partner. How can I assist you today?
                    </p>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-container">
                <div class="chat-input-wrapper">
                    <i class="fas fa-terminal terminal-icon"></i>
                    <input type="text" id="chatInput" placeholder="Enter command..." autocomplete="off">
                    <button class="chat-send-btn" onclick="sendChatMessage()" id="sendBtn">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
